name: Laravel App CI/CD (Self-Hosted)

on:
  push:
    branches:
      - main
      - develop

jobs:
  build_and_deploy:
    runs-on: self-hosted

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, curl, gd, intl, mbstring, pdo_mysql, zip, opcache

      - name: 3. Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev

      - name: 4. Deploy to Server (LOCAL)
        run: |
          DEPLOY_DIR="/var/www/html/application/backend"
          SRC_DIR="$GITHUB_WORKSPACE"

          echo "Cleaning old files..."
          rm -rf ${DEPLOY_DIR}/*

          echo "Copying new files..."
          cp -r $SRC_DIR/* $DEPLOY_DIR/

      - name: 5. Set Permissions
        run: |
          DEPLOY_DIR="/var/www/html/application/backend"

          sudo chown -R www-data:www-data $DEPLOY_DIR
          sudo chmod -R 775 $DEPLOY_DIR/storage
          sudo chmod -R 775 $DEPLOY_DIR/bootstrap/cache

      - name: 6. Laravel Optimize
        run: |
          cd /var/www/html/application/backend

          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: 7. Restart Services
        run: |
          sudo systemctl restart php8.3-fpm
          sudo systemctl reload nginx
