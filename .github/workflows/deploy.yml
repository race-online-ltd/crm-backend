name: Laravel App CI/CD (Self-Hosted)

on:
  push:
    branches:
      - main
      - develop

jobs:
  build_and_deploy:
    runs-on: self-hosted

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Deploy to Server (LOCAL)
        run: |
          DEPLOY_DIR="/var/www/html/application/backend"

          echo "Syncing files..."
          rsync -av --delete --exclude=".env" ./ $DEPLOY_DIR/

      - name: 3. Install Composer Dependencies
        run: |
          cd /var/www/html/application/backend
          composer install --no-dev --optimize-autoloader

      - name: 4. Set Permissions
        run: |
          DEPLOY_DIR="/var/www/html/application/backend"

          sudo chown -R www-data:www-data $DEPLOY_DIR
          sudo chmod -R 775 $DEPLOY_DIR/storage
          sudo chmod -R 775 $DEPLOY_DIR/bootstrap/cache

      - name: 5. Laravel Optimize
        run: |
          cd /var/www/html/application/backend

          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: 6. Restart Services
        run: |
          sudo systemctl restart php8.3-fpm
          sudo systemctl reload nginx
